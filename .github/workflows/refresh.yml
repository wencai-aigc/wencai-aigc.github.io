name: refresh portfolio

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Refresh Feishu media
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_TOKEN: ${{ secrets.LARK_BASE_TOKEN }}
          LARK_TABLE_ID: ${{ secrets.LARK_TABLE_ID }}
        run: python refresh.py

      - name: Commit refreshed JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -f api
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "chore: refresh feishu media urls"
            git push
          fi
